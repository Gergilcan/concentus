{{- if include "concentus.hasManagedSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "concentus.authSecretName" . }}
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.backend.claudeOAuthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.backend.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
