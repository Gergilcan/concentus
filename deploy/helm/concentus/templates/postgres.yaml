{{- if .Values.postgresql.enabled }}
{{- /*
Bundled PostgreSQL for run/flow-version persistence.

The backend creates its own schema on startup, so an empty database is all this needs.
Set postgresql.enabled=false and fill in externalDatabase.* to use a hosted database
(Neon, RDS, Cloud SQL) instead.
*/}}
{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "concentus.fullname" . }}-db
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  password: {{ include "concentus.dbPassword" . | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "concentus.fullname" . }}-db
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "concentus.fullname" . }}-db
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "concentus.fullname" . }}-db
  # Postgres is not clustered here; a second replica would corrupt the data directory.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "concentus.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        # The alpine image's postgres user; set here so the mounted volume is writable.
        fsGroup: 70
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "concentus.dbSecretName" . }}
                  key: {{ .Values.postgresql.existingSecretKey | default "password" }}
            # A subdirectory of the mount, so initdb isn't confused by a lost+found the
            # volume may arrive with.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
{{- end }}
