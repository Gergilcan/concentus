{{- if .Values.backend.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "concentus.backendName" . }}-data
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
  {{- with .Values.backend.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "concentus.backendName" . }}
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "concentus.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: ANTHROPIC_AUTH_MODE
              value: {{ .Values.backend.authMode | quote }}
            - name: CLAUDE_COMMAND
              value: claude
            - name: APP_DATA_DIR
              value: /data
            {{- if .Values.postgresql.enabled }}
            - name: PERSIST_DB_URL
              value: jdbc:postgresql://{{ include "concentus.fullname" . }}-db:5432/{{ .Values.postgresql.database }}
            - name: PERSIST_DB_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: PERSIST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "concentus.dbSecretName" . }}
                  key: {{ .Values.postgresql.existingSecretKey | default "password" }}
            {{- else if .Values.externalDatabase.url }}
            - name: PERSIST_DB_URL
              value: {{ .Values.externalDatabase.url | quote }}
            - name: PERSIST_DB_USER
              value: {{ .Values.externalDatabase.username | quote }}
            {{- if .Values.externalDatabase.existingSecret }}
            - name: PERSIST_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "password" }}
            {{- else if .Values.externalDatabase.password }}
            - name: PERSIST_DB_PASSWORD
              value: {{ .Values.externalDatabase.password | quote }}
            {{- end }}
            {{- else }}
            # No database configured — runs are kept in memory only and lost on restart.
            - name: PERSIST_ENABLED
              value: "false"
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.backend.existingSecret (include "concentus.hasManagedSecret" .) }}
          envFrom:
            - secretRef:
                name: {{ include "concentus.authSecretName" . }}
                optional: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/auth/status
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/status
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: data
        {{- if .Values.backend.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "concentus.backendName" . }}-data
        {{- else }}
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "concentus.backendName" . }}
  labels:
    {{- include "concentus.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
