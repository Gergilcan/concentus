apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: concentus-data
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: backend
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: concentus-backend
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: concentus
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: concentus
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: concentus/backend:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: ANTHROPIC_AUTH_MODE
              value: local
            - name: CLAUDE_COMMAND
              value: claude
            - name: APP_DATA_DIR
              value: /data
          envFrom:
            - secretRef:
                name: concentus-auth
                optional: true
          readinessProbe:
            httpGet:
              path: /api/auth/status
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/status
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: concentus-data
---
apiVersion: v1
kind: Service
metadata:
  # Named "backend" so the frontend's nginx (proxy_pass http://backend:8080) resolves it.
  name: backend
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: backend
  ports:
    - port: 8080
      targetPort: 8080
