# Claude auth for the backend. EDIT before applying (or replace with a SealedSecret / external secret).
# The token comes from `claude setup-token` on a machine with your Claude subscription — it is NOT
# an API key. Alternatively set ANTHROPIC_API_KEY here and ANTHROPIC_AUTH_MODE=api-key on the backend.
apiVersion: v1
kind: Secret
metadata:
  name: concentus-auth
  labels:
    app.kubernetes.io/name: concentus
type: Opaque
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_WITH_claude_setup-token_OUTPUT"
