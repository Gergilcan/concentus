apiVersion: apps/v1
kind: Deployment
metadata:
  name: concentus-frontend
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: concentus
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: concentus
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          # The image's nginx proxies /api and /ws to the Service named "backend" (see base/backend.yaml).
          image: concentus/frontend:1.0.0
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
