apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy into this namespace (create it first, or change/remove).
namespace: concentus

commonLabels:
  app.kubernetes.io/part-of: concentus

resources:
  - backend.yaml
  - frontend.yaml
  - secret.yaml

images:
  - name: concentus/backend
    newTag: "1.0.0"
  - name: concentus/frontend
    newTag: "1.0.0"
