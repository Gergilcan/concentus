apiVersion: v1
kind: ConfigMap
metadata:
  name: concentus-public-nginx
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: public-nginx
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
      }
      location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
      }
      location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: concentus-public-nginx
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: public-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: concentus
      app.kubernetes.io/component: public-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: concentus
        app.kubernetes.io/component: public-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: conf
          configMap:
            name: concentus-public-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: concentus-public-nginx
  labels:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: public-nginx
spec:
  # Change to NodePort if you have no cloud load balancer.
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: concentus
    app.kubernetes.io/component: public-nginx
  ports:
    - port: 80
      targetPort: 80
