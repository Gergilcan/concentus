server.port=8080
app.data-dir=${APP_DATA_DIR:./data}
# Execution/auth mode:
#   auto    -> ANTHROPIC_API_KEY set: cloud (Managed Agents); else local (claude CLI / subscription)
#   api-key -> force cloud; require ANTHROPIC_API_KEY
#   local   -> force the local claude CLI on your Claude subscription login
anthropic.auth-mode=${ANTHROPIC_AUTH_MODE:auto}
# Local (claude CLI) execution:
local.claude-command=${CLAUDE_COMMAND:}
local.permission-mode=${CLAUDE_PERMISSION_MODE:bypassPermissions}
# Auto-register MCP nodes into your Claude Code list (`claude mcp add`, user scope) at run time
local.auto-register-mcp=${LOCAL_AUTO_REGISTER_MCP:true}
# Directories that agents' "Context folders" may point inside (comma-separated).
# Required opt-in: while empty, every configured context folder is rejected, so a
# reachable deployment can't be told to read arbitrary host paths.
local.context-roots=${LOCAL_CONTEXT_ROOTS:}
# Reusable agent library (YAML AgentSpec files); defaults to <data-dir>/agents
app.agents-dir=${APP_AGENTS_DIR:}
# Managed-agent sessions stream for a long time; don't time out async work
spring.mvc.async.request-timeout=-1
spring.jackson.default-property-inclusion=non_null
# --- Run/execution persistence (PostgreSQL / Neon) ---
# Runs, their events, node outputs and session ids are stored so they survive a restart and can
# be continued. Override these env vars in production; the default points at the provided Neon DB.
# SECURITY: this default embeds a DB credential — move it to an env var / secret for real deployments.
app.persistence.enabled=${PERSIST_ENABLED:true}
spring.datasource.url=${PERSIST_DB_URL:jdbc:postgresql://ep-winter-wildflower-za27dgx4-pooler.c-2.eu-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${PERSIST_DB_USER:neondb_owner}
spring.datasource.password=${PERSIST_DB_PASSWORD:npg_wjpYS6nxoH3l}
# Don't fail startup if the DB is briefly unreachable — the app still runs in memory.
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=${PERSIST_DB_POOL:5}
spring.datasource.hikari.connection-timeout=10000
spring.sql.init.mode=never
# --- Cost estimate (USD per million tokens) shown next to token counts in the UI ---
# Defaults approximate Sonnet-class pricing; adjust to the models your flows actually use.
# Runs on a Claude subscription have no per-token bill — treat this as an equivalent-usage estimate.
pricing.input-usd-per-mtok=${PRICING_INPUT_USD_PER_MTOK:3.0}
pricing.output-usd-per-mtok=${PRICING_OUTPUT_USD_PER_MTOK:15.0}
logging.level.com.concentus=INFO
# --- RAG / SQL source security (WIR-7: SSRF + secret-exfiltration guard) ---
# Env var names that SqlSourceSpec.passwordEnv may resolve (exact names, comma-separated).
# A passwordEnv that matches neither this list nor the prefix list below resolves to no value
# instead of the real env var, so a spec can't be pointed at e.g. ANTHROPIC_API_KEY.
rag.allowed-env-vars=${RAG_ALLOWED_ENV_VARS:}
# Env var name prefixes allowed for the same purpose (comma-separated).
rag.allowed-env-var-prefixes=${RAG_ALLOWED_ENV_VAR_PREFIXES:WIREJ_DB_}
# JDBC drivers (the jdbc:<driver>://... scheme) a SQL RAG source may target. Only the bundled
# PostgreSQL driver is allowed by default; add others (comma-separated) as their drivers are added.
rag.allowed-jdbc-drivers=${RAG_ALLOWED_JDBC_DRIVERS:postgresql}
# Extra hosts (hostnames or IPs, comma-separated) a SQL RAG source may target beyond normal
# public/internal hosts. Loopback, link-local, and cloud metadata hosts (169.254.169.254) are
# blocked even if not listed here, unless explicitly added to this list.
rag.allowed-jdbc-hosts=${RAG_ALLOWED_JDBC_HOSTS:}
# --- Run registry / executor bounds (WIR-9: cap unbounded memory/thread growth) ---
# Max concurrent local/cloud run turns executed at once (core=max threads in the run-worker pool).
runs.max-concurrent=${RUNS_MAX_CONCURRENT:8}
# Queued run submissions allowed beyond max-concurrent before new ones are rejected
# (RejectedExecutionException -> run is failed with a "try again shortly" message).
runs.queue-capacity=${RUNS_QUEUE_CAPACITY:64}
# Max runs kept in the in-memory registry. Once exceeded, oldest completed (TERMINATED/ERROR)
# runs are evicted first; active/running runs are never evicted.
runs.max-retained=${RUNS_MAX_RETAINED:200}
# Actuator: expose only health + info; everything else (env, beans, heapdump, ...) stays off.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
